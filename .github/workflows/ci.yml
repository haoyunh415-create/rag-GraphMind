name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
      OPENAI_API_KEY: ""
      API_AUTH_TOKEN: ""
      SQLITE_DB_PATH: /tmp/rag-ci.db
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py"

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  compose:
    name: Docker Compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose config
        env:
          CORS_ORIGINS: http://localhost:3000
          API_AUTH_TOKEN: ci-token
          NEXT_PUBLIC_API_AUTH_TOKEN: ci-token
          NEXT_PUBLIC_API_URL: http://localhost:8000
          OPENAI_API_KEY: ci-openai-key
          OPENAI_MODEL: gpt-4o
          EMBEDDING_MODEL: text-embedding-3-small
          LLM_BASE_URL: https://api.openai.com/v1
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: ci-neo4j-password
          MINIO_ACCESS_KEY: ci-minio-access-key
          MINIO_SECRET_KEY: ci-minio-secret-key
        run: |
          cat > .env <<EOF
          CORS_ORIGINS=${CORS_ORIGINS}
          API_AUTH_TOKEN=${API_AUTH_TOKEN}
          NEXT_PUBLIC_API_AUTH_TOKEN=${NEXT_PUBLIC_API_AUTH_TOKEN}
          NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          OPENAI_MODEL=${OPENAI_MODEL}
          EMBEDDING_MODEL=${EMBEDDING_MODEL}
          LLM_BASE_URL=${LLM_BASE_URL}
          NEO4J_USER=${NEO4J_USER}
          NEO4J_PASSWORD=${NEO4J_PASSWORD}
          MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
          MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
          EOF
          docker compose config --quiet
